# Сервис для рассыльщика (аналогично планировщику — без внешнего HTTP API).
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-calendar-sender
  labels:
    {{- include "calendar-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: calendar-sender
spec:
  type: {{ .Values.sender.service.type }}
  ports:
    - name: tcp
      port: {{ .Values.sender.service.port }}
      targetPort: tcp
  selector:
    app.kubernetes.io/component: calendar-sender
    app.kubernetes.io/instance: {{ .Release.Name }}

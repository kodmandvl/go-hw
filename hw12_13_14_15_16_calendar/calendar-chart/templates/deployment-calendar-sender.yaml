# Рассыльщик: потребляет очередь уведомлений и публикует статусы (см. ДЗ №15).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-calendar-sender
  labels:
    {{- include "calendar-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: calendar-sender
spec:
  replicas: {{ .Values.sender.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: calendar-sender
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: calendar-sender
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: calendar-sender
          image: "{{ .Values.sender.image.repository }}:{{ .Values.sender.image.tag }}"
          imagePullPolicy: {{ .Values.sender.image.pullPolicy }}
          ports:
            - name: tcp
              containerPort: {{ .Values.sender.service.port }}
          command:
            - /app/calendar_sender
            - --config
            - /app/configs/sender_docker.yaml
          volumeMounts:
            - name: app-config
              mountPath: /app/configs
          livenessProbe:
            exec:
              command:
                - /bin/true
            periodSeconds: 30
          {{- with .Values.sender.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: app-config
          configMap:
            name: {{ .Release.Name }}-app-config

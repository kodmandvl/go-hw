# Deployment HTTP/gRPC API: конфиг из ConfigMap; Postgres — внешний сервис (см. values.database.host).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-calendar-api
  labels:
    {{- include "calendar-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: calendar-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: calendar-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: calendar-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: calendar-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.api.service.grpcPort }}
          command:
            - /app/calendar
            - --config
            - /app/configs/calendar_docker.yaml
          volumeMounts:
            - name: app-config
              mountPath: /app/configs
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: app-config
          configMap:
            name: {{ .Release.Name }}-app-config

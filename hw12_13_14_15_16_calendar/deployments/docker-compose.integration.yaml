services:
  postgres:
    image: postgres:16.13-alpine3.22
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backend"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  calendar:
    build:
      context: ..
      dockerfile: build/Dockerfile.calendar
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/ | grep -q 'calendar ok'"]
      interval: 5s
      timeout: 3s
      retries: 20

  scheduler:
    build:
      context: ..
      dockerfile: build/Dockerfile.scheduler
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  sender:
    build:
      context: ..
      dockerfile: build/Dockerfile.sender
    depends_on:
      rabbitmq:
        condition: service_healthy

  integration-tests:
    build:
      context: ..
      dockerfile: build/Dockerfile.integration
    depends_on:
      calendar:
        condition: service_healthy
      scheduler:
        condition: service_started
      sender:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      CALENDAR_BASE_URL: "http://calendar:8080"
      RABBIT_URI: "amqp://rabbit:password@rabbitmq:5672/"
      RABBIT_STATUS_QUEUE: "calendar_notifications_status"

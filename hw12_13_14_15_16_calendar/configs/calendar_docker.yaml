logger:
  level: "INFO" # ERROR|WARNING|INFO|DEBUG
  path: "./logs/calendar.log"

storage:
  type: "sql" # В docker-compose API должен работать с общей БД.

http:
  host: "0.0.0.0"
  port: 8080

grpc:
  host: "0.0.0.0"
  port: 50051

db:
  dbhost: "postgres"
  dbport: 5432
  dbname: "backend"
  dbusername: "postgres"
  dbpassword: "password"
